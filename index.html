<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바닐라코 PR 모니터링 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#F7F5F2;--bg-white:#FFFFFF;--bg-soft:#F0EDE8;
  --border:#E4DFD8;--border-strong:#C8BFB5;
  --text-title:#1A1614;--text-body:#3D3530;--text-sub:#7A6E68;--text-muted:#A89E97;
  --jasa:#D4547A;--jasa-bg:#FDF0F4;--jasa-border:#F2C4D2;
  --competitor:#6B5CE7;--competitor-bg:#F3F1FD;--competitor-border:#C9C2F5;
  --base:#1A9B7A;--base-bg:#EEF8F5;--base-border:#B3E4D7;
  --beauty:#C47D16;--beauty-bg:#FDF6EA;--beauty-border:#F0CFA0;
  --china:#C94A3A;--china-bg:#FDF1EF;--china-border:#F2C0BA;
  --shadow-sm:0 1px 3px rgba(60,40,30,.06),0 1px 2px rgba(60,40,30,.04);
  --shadow-md:0 4px 16px rgba(60,40,30,.08),0 2px 6px rgba(60,40,30,.05);
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text-body);font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}
.header{background:var(--bg-white);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);}
.header-left{display:flex;align-items:center;gap:14px;}

.brand-name{font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;color:var(--text-title);letter-spacing:-.02em;}
.brand-tagline{font-size:11px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:16px;}
.live-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-sub);}
.live-dot{width:6px;height:6px;border-radius:50%;background:#52C87A;box-shadow:0 0 0 3px rgba(82,200,122,.2);animation:livePulse 2s infinite;}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 3px rgba(82,200,122,.2)}50%{box-shadow:0 0 0 6px rgba(82,200,122,.08)}}
.header-date{font-size:12px;color:var(--text-muted);border-left:1px solid var(--border);padding-left:16px;}
.container{max-width:1360px;margin:0 auto;padding:32px 40px 80px;}
.filter-bar{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 24px;margin-bottom:20px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:28px;flex-wrap:wrap;}
.filter-group{display:flex;align-items:center;gap:10px;}
.filter-label-text{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}
.tab-row{display:flex;gap:6px;flex-wrap:wrap;}
.tab-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--text-sub);cursor:pointer;transition:all .16s;white-space:nowrap;font-weight:500;}
.tab-btn:hover{background:var(--bg-soft);border-color:var(--border-strong);color:var(--text-body);}
.tab-btn.active{background:var(--text-title);border-color:var(--text-title);color:#fff;font-weight:600;}
.filter-divider{width:1px;height:28px;background:var(--border);}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px;}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
.kpi-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:20px 20px 16px;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s;position:relative;overflow:hidden;}
.kpi-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.kpi-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--kpi-accent,var(--border));border-radius:0 0 var(--radius) var(--radius);}
.kpi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:10px;background:var(--kpi-bg,var(--bg-soft));}
.kpi-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.kpi-value{font-family:'Noto Sans KR',sans-serif;font-size:32px;font-weight:700;color:var(--text-title);line-height:1;margin-bottom:6px;letter-spacing:-.03em;}
.kpi-pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;background:var(--kpi-bg,var(--bg-soft));color:var(--kpi-accent,var(--text-sub));}
.kpi-sub{font-size:11px;color:var(--text-muted);}
.card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);}
.card-header{padding:18px 24px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.card-title-icon{width:20px;height:20px;border-radius:5px;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;font-size:11px;}
.card-body{padding:0 24px 22px;}
.row-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}

@media(max-width:960px){.row-2col{grid-template-columns:1fr;}}





.kw-cloud{display:flex;flex-direction:column;gap:8px;}
.kw-group{display:flex;flex-direction:column;gap:0;}
.kw-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:var(--bg-soft);transition:background .15s;}
.kw-item:hover{background:var(--border);}
.kw-type{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;padding:2px 7px;border-radius:5px;border:1px solid;line-height:1.4;}
.kw-name{font-size:13px;font-weight:600;color:var(--text-title);flex:1;word-break:keep-all;line-height:1.4;}
.kw-count{font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;padding:2px 8px;border-radius:10px;line-height:1.4;}
.kw-sub-list{display:flex;flex-direction:column;gap:0;border-left:2px solid var(--border);margin:0 0 0 12px;padding:2px 0;}
.kw-sub-item{display:flex;align-items:center;gap:8px;padding:5px 12px;transition:background .15s;border-radius:0 6px 6px 0;}
.kw-sub-item:hover{background:var(--bg-soft);}
.kw-sub-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.kw-sub-label{font-size:12px;color:var(--text-sub);flex:1;word-break:keep-all;line-height:1.4;}
.kw-sub-count{font-size:11px;color:var(--text-muted);white-space:nowrap;}

.cat-filter-bar{display:flex;gap:8px;flex-wrap:wrap;padding:14px 24px;border-bottom:1px solid var(--border);}
.cat-btn{padding:5px 15px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;color:var(--text-sub);cursor:pointer;transition:all .15s;}
.cat-btn:hover{background:var(--bg-soft);color:var(--text-body);}
.cat-btn.active.all{background:var(--text-title);border-color:var(--text-title);color:#fff;}
.cat-btn.active.jasa{background:var(--jasa-bg);border-color:var(--jasa);color:var(--jasa);font-weight:700;}
.cat-btn.active.competitor{background:var(--competitor-bg);border-color:var(--competitor);color:var(--competitor);font-weight:700;}
.cat-btn.active.base{background:var(--base-bg);border-color:var(--base);color:var(--base);font-weight:700;}
.cat-btn.active.beauty{background:var(--beauty-bg);border-color:var(--beauty);color:var(--beauty);font-weight:700;}
.cat-btn.active.china{background:var(--china-bg);border-color:var(--china);color:var(--china);font-weight:700;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--bg-soft);padding:10px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border);}
tbody td{padding:13px 16px;border-bottom:1px solid var(--bg-soft);font-size:13px;color:var(--text-body);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#FAFAF8;}
.article-link{color:var(--text-title);text-decoration:none;font-weight:500;line-height:1.5;transition:color .15s;display:block;max-width:500px;}
.article-link:hover{color:var(--jasa);text-decoration:underline;}
.article-link.no-url{cursor:default;color:var(--text-body);}
.article-link.no-url:hover{color:var(--text-body);text-decoration:none;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid;}
.badge.jasa-b{color:var(--jasa);background:var(--jasa-bg);border-color:var(--jasa-border);}
.badge.comp-b{color:var(--competitor);background:var(--competitor-bg);border-color:var(--competitor-border);}
.badge.base-b{color:var(--base);background:var(--base-bg);border-color:var(--base-border);}
.badge.beau-b{color:var(--beauty);background:var(--beauty-bg);border-color:var(--beauty-border);}
.badge.chin-b{color:var(--china);background:var(--china-bg);border-color:var(--china-border);}
.channel-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:var(--bg-soft);color:var(--text-sub);font-weight:500;}
.pagination{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;border-top:1px solid var(--border);}
/* ── 뷰 토글 버튼 ── */
.view-toggle{display:flex;gap:4px;}
.view-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;color:var(--text-sub);cursor:pointer;transition:all .15s;}
.view-btn:hover{background:var(--bg-soft);color:var(--text-body);}
.view-btn.active{background:var(--text-title);border-color:var(--text-title);color:#fff;}
.view-btn svg{width:13px;height:13px;flex-shrink:0;}
/* ── 카드 그리드 ── */
.article-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:20px 24px;}
@media(max-width:1100px){.article-card-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.article-card-grid{grid-template-columns:1fr;}}
.article-card{background:var(--bg-soft);border:1px solid var(--border);border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .18s,transform .18s;cursor:pointer;}
.article-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.article-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.article-card-title{font-size:14px;font-weight:600;color:var(--text-title);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.article-card-title a{color:inherit;text-decoration:none;}
.article-card-title a:hover{color:var(--jasa);}
.article-card-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.article-card-info{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);}
.article-card-source{font-weight:600;color:var(--text-sub);font-size:12px;}
.article-card-open{font-size:11px;color:var(--jasa);text-decoration:none;font-weight:600;white-space:nowrap;padding:3px 8px;border:1px solid var(--jasa-border);border-radius:6px;background:var(--jasa-bg);transition:all .15s;}
.article-card-open:hover{background:var(--jasa);color:#fff;}
.article-card-open.no-url{opacity:0;pointer-events:none;}

.page-info{font-size:12px;color:var(--text-muted);}
.page-btns{display:flex;gap:4px;}
.page-btn{min-width:32px;height:32px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text-sub);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.page-btn:hover:not(:disabled){background:var(--bg-soft);color:var(--text-body);border-color:var(--border-strong);}
.page-btn.active{background:var(--text-title);border-color:var(--text-title);color:#fff;font-weight:600;}
.page-btn:disabled{opacity:.35;cursor:not-allowed;}
.summary-bar{background:linear-gradient(135deg,#FDF0F4 0%,#F3F1FD 50%,#EEF8F5 100%);border:1px solid var(--border);border-radius:var(--radius);padding:14px 24px;margin-bottom:20px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-body);}
.summary-bar strong{color:var(--text-title);font-weight:700;}
.empty-state{text-align:center;padding:40px;color:var(--text-muted);}
</style>
</head>

// 기사 배열에서 그룹 매칭 → 병합 구조 생성
function buildGroups(articles, groupDefs) {
  const result = [];
  for (const gd of groupDefs) {
    const matchedItems = [];
    for (const item of gd.items) {
      const cnt = articles.filter(a => item.tests.some(re => { re.lastIndex=0; return re.test(a.기사제목); })).length;
      if (cnt > 0) matchedItems.push({ label: item.label, count: cnt });
    }
    if (!matchedItems.length) continue;
    const total = matchedItems.reduce((s,i)=>s+i.count, 0);
    // 하위 항목이 1개면 바로 표시, 2개 이상이면 그룹 표시 + 하위 표시
    result.push({ group: gd.group, type: gd.type, total, items: matchedItems.sort((a,b)=>b.count-a.count) });
  }
  return result.sort((a,b) => b.total - a.total);
}

      return `<div class="kw-group">
        <div class="kw-item">
          <span class="kw-type" style="color:${tc.fg};background:${tc.bg};border-color:${tc.bd}">${g.type}</span>
          <span class="kw-name">${mainLabel}</span>
          <span class="kw-count" style="color:${accentColor};background:${accentColor}18">${g.total}건</span>
        </div>
        ${subHtml ? `<div class="kw-sub-list">${subHtml}</div>` : ''}
      </div>`;
    }).join('') + '</div>';
  };

  document.getElementById('jasaKeywords').innerHTML  = makeGroupBlock(buildGroups(jasaA, JASA_GROUPS),  CAT_COLORS['자사']);
  document.getElementById('beautyKeywords').innerHTML = makeGroupBlock(buildGroups(beautyA, BEAUTY_GROUPS), CAT_COLORS['뷰티 트렌드']);
}

function renderTabs(){
  const months=getMonths(),weeks=getWeeks(selMonth);
  document.getElementById('monthTabs').innerHTML=`<button class="tab-btn ${selMonth==='all'?'active':''}" onclick="setMonth('all')">전체</button>`+months.map(m=>`<button class="tab-btn ${selMonth===m?'active':''}" onclick="setMonth(${m})">${m}월</button>`).join('');
  document.getElementById('weekTabs').innerHTML=selMonth==='all'
    ? `<button class="tab-btn active" onclick="setWeek('all')">전체</button>`
    : `<button class="tab-btn ${selWeek==='all'?'active':''}" onclick="setWeek('all')">전체</button>`+weeks.map(w=>`<button class="tab-btn ${selWeek===w?'active':''}" onclick="setWeek('${w}')">${w}</button>`).join('');
}

function renderSummary(){
  const d=getFiltered(),label=selMonth==='all'?'전체 기간':`${selMonth}월${selWeek==='all'?'':' '+selWeek}`;
  document.getElementById('summaryBar').innerHTML=`<span>📋</span> <strong>${label}</strong> 기준 — 총 <strong>${d.length}건</strong>의 기사를 분석 중입니다.`;
}

function renderKPI(){
  const data=getFiltered(),total=data.length,cnt={};
  CATEGORIES.forEach(c=>cnt[c]=data.filter(d=>d.카테고리===c).length);
  document.getElementById('kpiGrid').innerHTML=KPI_CONF.map(k=>{
    const v=k.key==='total'?total:(cnt[k.key]||0),pct=total?Math.round(v/total*100):0;
    return `<div class="kpi-card" style="--kpi-accent:${k.accent};--kpi-bg:${k.bg}"><div class="kpi-icon">${k.icon}</div><div class="kpi-label">${k.label}</div><div class="kpi-value">${v}</div>${k.key!=='total'?`<div class="kpi-pill">${pct}% 비중</div>`:`<div class="kpi-sub">선택 기간 합산</div>`}</div>`;
  }).join('');
}

function renderCatFilter(){
  const cats=['전체',...CATEGORIES];
  document.getElementById('catFilter').innerHTML=cats.map(c=>{const cl=c==='전체'?'all':(CAT_CLASS[c]||'');return `<button class="cat-btn ${selCat===c?'active '+cl:''}" onclick="setCat('${c}')">${c==='전체'?'전체':(CAT_ICON[c]||'')+' '+c}</button>`;}).join('');
}

// ── 뷰 모드 ──────────────────────────────────────────────────────────
let viewMode = 'table'; // 'table' | 'card'

function setView(mode) {
  viewMode = mode;
  document.getElementById('cardView').style.display  = mode==='card'  ? '' : 'none';
  document.getElementById('tableView').style.display = mode==='table' ? '' : 'none';
  document.getElementById('btnCard').classList.toggle('active',  mode==='card');
  document.getElementById('btnTable').classList.toggle('active', mode==='table');
  curPage = 1;
  renderArticles();
}

function renderArticles() {
  const data  = getFiltered().filter(d => selCat==='전체' || d.카테고리===selCat);
  const total = data.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  curPage = Math.min(curPage, pages);
  const slice = data.slice((curPage-1)*PAGE_SIZE, curPage*PAGE_SIZE);

  if (viewMode === 'card') {
    renderCardView(slice, total);
  } else {
    renderTableView(slice, total);
  }
  renderPagination(total, pages);
}


function renderCardView(slice, total) {
  if (!slice.length) {
    document.getElementById('articleCards').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><p>해당 조건의 기사가 없습니다.</p></div>';
    return;
  }
  document.getElementById('articleCards').innerHTML = slice.map(d => {
    const bdg     = '<span class="badge ' + (CAT_BADGE[d.카테고리]||'') + '">' + d.카테고리 + '</span>';
    const titleEl = d.url
      ? '<a href="' + d.url + '" target="_blank" rel="noopener">' + d.기사제목 + '</a>'
      : d.기사제목;
    const openBtn = d.url
      ? '<a href="' + d.url + '" target="_blank" rel="noopener" class="article-card-open">열기 →</a>'
      : '<span class="article-card-open no-url">열기 →</span>';
    return '<div class="article-card">'
      + '<div class="article-card-top">' + bdg + '</div>'
      + '<div class="article-card-title">' + titleEl + '</div>'
      + '<div class="article-card-meta">'
      + '<div class="article-card-info">'
      + '<span class="article-card-source">' + d.매체 + '</span>'
      + '<span>·</span>'
      + '<span>' + (d.날짜||'—') + '</span>'
      + '<span class="channel-tag" style="margin-left:2px">' + d.채널 + '</span>'
      + '</div>'
      + openBtn
      + '</div></div>';
  }).join('');
}
function renderTableView(slice, total) {
  document.getElementById('articleTable').innerHTML = slice.length
    ? slice.map(d=>`<tr>
        <td style="white-space:nowrap;color:var(--text-sub)">${d.날짜||'—'}</td>
        <td style="white-space:nowrap;font-weight:500">${d.매체}</td>
        <td><span class="channel-tag">${d.채널}</span></td>
        <td><span class="badge ${CAT_BADGE[d.카테고리]||''}">${d.카테고리}</span></td>
        <td>${d.url
          ?`<a class="article-link" href="${d.url}" target="_blank" rel="noopener">${d.기사제목}</a>`
          :`<span class="article-link no-url">${d.기사제목}</span>`
        }</td>
      </tr>`).join('')
    : `<tr><td colspan="5"><div class="empty-state"><p>해당 조건의 기사가 없습니다.</p></div></td></tr>`;
}

function renderPagination(total, pages) {
  const pg = document.getElementById('paginationBar');
  if (pages <= 1) { pg.innerHTML=`<div class="page-info">${total}건</div><div></div>`; return; }
  let btns='';
  for(let p=1;p<=pages;p++){
    if(pages>7&&p>2&&p<pages-1&&Math.abs(p-curPage)>1){
      if(p===3||p===pages-2) btns+='<span style="padding:0 6px;color:var(--text-muted);font-size:12px">…</span>';
      continue;
    }
    btns+=`<button class="page-btn ${p===curPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  pg.innerHTML=`<div class="page-info">${total}건 중 ${(curPage-1)*PAGE_SIZE+1}–${Math.min(curPage*PAGE_SIZE,total)}</div><div class="page-btns"><button class="page-btn" onclick="goPage(${curPage-1})" ${curPage===1?'disabled':''}>‹ 이전</button>${btns}<button class="page-btn" onclick="goPage(${curPage+1})" ${curPage===pages?'disabled':''}>다음 ›</button></div>`;
}

// 기존 renderTable → renderArticles로 통합
function renderTable(){ renderArticles(); }

function setMonth(m){selMonth=m;selWeek='all';curPage=1;renderAll();}
function setWeek(w){selWeek=w;curPage=1;renderAll();}
function setCat(c){selCat=c;curPage=1;renderCatFilter();renderArticles();}
function goPage(p){curPage=p;renderArticles();}
function renderAll(){renderTabs();renderSummary();renderKPI();renderKeywords();renderCatFilter();renderArticles();}

document.getElementById('headerDate').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
renderAll();
</script>
